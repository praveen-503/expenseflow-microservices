name: Build and Deploy Expense Service

on:
  push:
    branches:
      - main
    paths:
      - 'src/Services/Expense/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'expenseflow-expense-api'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish API
      run: dotnet publish src/Services/Expense/ExpenseFlow.Expense.Api/ExpenseFlow.Expense.Api.csproj -c Release -o ${{ github.workspace }}/publish

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_EXPENSE_PUBLISH_PROFILE }}
        package: ${{ github.workspace }}/publish
