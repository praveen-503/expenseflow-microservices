name: Build and Deploy Angular Client (SWA)

on:
  push:
    branches:
      - main
    paths:
      - 'src/Web/expenseflow-client/**'
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: src/Web/expenseflow-client/package-lock.json

      - name: Install dependencies
        working-directory: src/Web/expenseflow-client
        run: npm ci

      - name: Build Angular app
        working-directory: src/Web/expenseflow-client
        run: npm run build

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "src/Web/expenseflow-client/dist/expenseflow-client/browser"
          api_location: ""
          skip_app_build: true
        env:
          NG_DISABLE_VERSION_CHECK: '1'
