name: Build and Deploy Notification API

on:
  push:
    branches:
      - main
    paths:
      - 'src/Services/Notification/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'expenseflow-notification-api'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish API
      run: dotnet publish src/Services/Notification/ExpenseFlow.Notification.Api/ExpenseFlow.Notification.Api.csproj -c Release -o ${{ github.workspace }}/publish

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_NOTIFICATION_API_PUBLISH_PROFILE }}
        package: ${{ github.workspace }}/publish
