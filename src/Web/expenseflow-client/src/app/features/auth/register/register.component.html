<div class="auth-wrapper">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Create Account</mat-card-title>
      <mat-card-subtitle>Join ExpenseFlow Portal</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content class="auth-content">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>First Name</mat-label>
          <input matInput formControlName="firstName">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Last Name</mat-label>
          <input matInput formControlName="lastName">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password">
        </mat-form-field>

        @if (errorMessage) {
          <div class="error-box">
            {{ errorMessage }}
          </div>
        }

        <div class="actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="registerForm.invalid">Register</button>
          <a routerLink="/auth/login" class="toggle-link">Login instead</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
