<div class="admin-wrapper">
  <!-- Page Header -->
  <div class="page-header">
    <div class="breadcrumbs">
      <span>Dashboard</span>
      <mat-icon>chevron_right</mat-icon>
      <span class="active">Admin Panel</span>
    </div>
    <h1 class="page-title">Admin Control Panel</h1>
    <p class="page-subtitle">Manage system users, microservice configurations, and authorization scopes</p>
  </div>

  <!-- Users Management Card -->
  <mat-card class="admin-card premium-card">
    <mat-card-header class="card-header-area">
      <mat-card-title>System Users</mat-card-title>
    </mat-card-header>
    <mat-card-content class="admin-content">
      <table mat-table [dataSource]="users()" class="full-width">
        <!-- Email Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let element" style="font-weight: 500; color: var(--text-primary);">
            {{ element.email }}
          </td>
        </ng-container>

        <!-- First Name Column -->
        <ng-container matColumnDef="firstName">
          <th mat-header-cell *matHeaderCellDef>First Name</th>
          <td mat-cell *matCellDef="let element">{{ element.firstName }}</td>
        </ng-container>

        <!-- Last Name Column -->
        <ng-container matColumnDef="lastName">
          <th mat-header-cell *matHeaderCellDef>Last Name</th>
          <td mat-cell *matCellDef="let element">{{ element.lastName }}</td>
        </ng-container>

        <!-- Role Column -->
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let element">
            <span class="role-badge" [class.admin-badge]="element.role === 'Administrator'">
              {{ element.role }}
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
