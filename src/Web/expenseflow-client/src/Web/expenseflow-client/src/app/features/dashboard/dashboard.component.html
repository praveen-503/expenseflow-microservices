<div class="dashboard-header">
  <h1>Dashboard</h1>
  <p>Track your balances, expenses, and system notifications.</p>
</div>

<div class="grid-container">
  <mat-card class="stat-card sum-card">
    <mat-card-header>
      <mat-card-title>Monthly Spending</mat-card-title>
      <mat-icon mat-card-avatar color="primary">account_balance_wallet</mat-icon>
    </mat-card-header>
    <mat-card-content>
      <h2 class="stat-value">${{ mockExpensesSum() }}</h2>
    </mat-card-content>
  </mat-card>

  <mat-card class="stat-card count-card">
    <mat-card-header>
      <mat-card-title>Logged Expenses</mat-card-title>
      <mat-icon mat-card-avatar color="accent">receipt</mat-icon>
    </mat-card-header>
    <mat-card-content>
      <h2 class="stat-value">{{ mockExpensesCount() }}</h2>
    </mat-card-content>
  </mat-card>

  <mat-card class="stat-card notification-card">
    <mat-card-header>
      <mat-card-title>Notifications</mat-card-title>
      <mat-icon mat-card-avatar color="warn">notifications</mat-icon>
    </mat-card-header>
    <mat-card-content>
      <h2 class="stat-value">{{ activeNotificationsCount() }}</h2>
    </mat-card-content>
  </mat-card>
</div>
